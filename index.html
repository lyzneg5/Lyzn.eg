<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
   Lyzn.eg
</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loader">
<h1>Lyzn.eg</h1>
</div>

<!-- NAV -->
<nav>
<div class="logo"> Lyzn.eg</div>
<a href="cart.html" class="cart">🛒 <span id="cartCount">0</span></a>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Premium Streetwear</h1>
<p>Lyzn.eg Collection</p>
</section>

<!-- PRODUCTS -->
<section class="container">

<button class="arrow left" onclick="scrollLeft()">❮</button>

<div class="slider" id="slider">

<!-- 7 PRODUCTS -->
<div class="card">
<img src="https://picsum.photos/400/500?1">
<h3>Classic Tee</h3>
<div class="price">350 EGP</div>
<button onclick="addToCart('Classic Tee',350)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?2">
<h3>Oversized Tee</h3>
<div class="price">400 EGP</div>
<button onclick="addToCart('Oversized Tee',400)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?3">
<h3>Black Hoodie</h3>
<div class="price">650 EGP</div>
<button onclick="addToCart('Black Hoodie',650)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?4">
<h3>Cargo Pants</h3>
<div class="price">550 EGP</div>
<button onclick="addToCart('Cargo Pants',550)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?5">
<h3>Summer Shirt</h3>
<div class="price">450 EGP</div>
<button onclick="addToCart('Summer Shirt',450)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?6">
<h3>Street Set</h3>
<div class="price">700 EGP</div>
<button onclick="addToCart('Street Set',700)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/500?7">
<h3>Premium Hoodie</h3>
<div class="price">750 EGP</div>
<button onclick="addToCart('Premium Hoodie',750)">Add to Cart</button>
</div>

</div>

<button class="arrow right" onclick="scrollRight()">❯</button>

</section>

<script src="script.js"></script>
</body>
</html>
